# juno.properties \u2014 central defaults for all Juno entry points
# Precedence at runtime: CLI / -D flags > environment > this file > code defaults
# Build-time substitution: @project.version@ is replaced by the Maven resource plugin

# \u2500\u2500 Build metadata \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
juno.version=@project.version@

# \u2500\u2500 [runtime] mode, model, JVM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# model.path is required for inference (override via MODEL_PATH or --model-path)
model.path=../models/tinyllama-1.1b-chat-v1.0-q4_k_m.gguf
mode=local
# mode=local | lora | merge | test
jvm.heap=4g
jvm.heap.min=512m
jvm.gc=ZGC
verbose=false

# \u2500\u2500 [inference] sampling defaults \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
inference.temperature=0.6
inference.top_k=50
inference.top_p=0.9
inference.max_tokens=200
inference.repetition_penalty=1.1

# \u2500\u2500 [cluster] nodes, parallelism, networking \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
cluster.nodes=3
cluster.p_type=pipeline
cluster.dtype=FLOAT16
cluster.byte_order=BE
cluster.grpc.port.base=19092
# cluster.node.addresses=host1:19092,host2:19092
# cluster.coordinator.mode=node1

# \u2500\u2500 [compute] GPU/CPU, dtype, byte order \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
compute.use_gpu=true
compute.gpu.backend=auto
compute.cuda.device=0

# \u2500\u2500 [lora] training + inference overlay \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# lora.play.path=
lora.path=../models/
lora.rank=8
lora.alpha=-1f
lora.lr=0.0001
lora.steps=50
lora.steps_qa=10
lora.early_stop=0.25
lora.train.chunk_tokens=32
lora.adam.beta1=0.9
lora.adam.beta2=0.999
lora.adam.epsilon=0.00000001
lora.adam.weight_decay=0.01
# lora.merge.output=
lora.merge.heap=4g

# \u2500\u2500 [api] REST server, scheduler, batching \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# api.port=
api.http.port=8080
scheduler.max_queue=1000
scheduler.batch.max_size=8
scheduler.batch.window_ms=50
scheduler.priority.default=NORMAL
kv.gpu.bytes=536870912
kv.cpu.blocks=8192

# \u2500\u2500 [health] sidecar thresholds \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
health.enabled=false
health.port=8081
health.stale_ms=15000
health.vram.warn=0.90
health.vram.critical=0.98
# health.reporter.url=
health.reporter.interval_ms=5000

# \u2500\u2500 [observability] JFR, logging \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
jfr.duration=1h
jfr.settings=profile
jfr.output.pattern=juno-{nodeId}-{modelStem}-{timestamp}.jfr
# metrics.output=