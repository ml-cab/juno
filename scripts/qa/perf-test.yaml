# -----------------------------------------------------------------------------
# METRICS TO CAPTURE PER RUN
# All sourced from target/metrics/metrics.json after JFR extraction.
# -----------------------------------------------------------------------------

metrics:
  primary:
    - juno.TokenProduced.count
    - juno.TokenProduced.elapsed_seconds
    - juno.TokenProduced.tps

  forward_pass:
    - juno.ForwardPass.count
    - juno.ForwardPass.prefill.count
    - juno.ForwardPass.decode.count
    - juno.ForwardPass.prefill.p95_ms
    - juno.ForwardPass.decode.p95_ms

  matvec:
    - juno.MatVec.count
    - juno.MatVec.duration.total_ms
    - juno.MatVec.duration.p95_ms
    - juno.MatVec.backend.cpu.count
    - juno.MatVec.backend.cpu.p95_ms
    - juno.MatVec.backend.cuda_resident_fp16.count
    - juno.MatVec.backend.cuda_resident_fp16.p95_ms

  tokenizer:
    - juno.Tokenizer.encode.count
    - juno.Tokenizer.encode.p95_ms
    - juno.Tokenizer.decodeToken.count
    - juno.Tokenizer.decodeToken.p95_ms
    - juno.TemplateFormat.count
    - juno.TemplateFormat.p95_ms

  lora:                           # non-zero only in lora_overhead suite
    - juno.LoraTrainStep.count
    - juno.LoraTrainStep.forward_ms.p95
    - juno.LoraTrainStep.backward_ms.p95
    - juno.LoraTrainStep.optimizer_ms.p95